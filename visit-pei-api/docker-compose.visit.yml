services:
  visit_db:
    image: postgis/postgis:16-3.4
    container_name: visit_upei_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: visit_upei
      POSTGRES_PASSWORD: "VisitUpei_2026!"
      POSTGRES_DB: visit_upei
    ports:
      - "5433:5432"
    volumes:
      - visit_upei_pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: visitpei_redis
    ports:
      - "6379:6379"
      
volumes:
  visit_upei_pgdata:
